name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + model + dev)
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps CI fast; rdkit is intentionally omitted (hashed-
          # fingerprint fallback), so the full suite runs without heavy bio deps.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/ scripts/

      - name: Test (pytest)
        run: pytest -q
